name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build macOS App
      run: |
        xcodebuild clean build \
          -project "Youtube.xcodeproj" \
          -scheme "Youtube" \
          -configuration Release \
          -destination "platform=macOS" \
          SYMROOT="$(PWD)/build" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Sign and Package the App
      run: |
        cd build/Release
        # ประทับตรา Ad-Hoc
        codesign --force --deep -s - Youtube.app
        # บีบอัดด้วยวิธีมาตรฐานของ Apple
        ditto -c -k --sequesterRsrc --keepParent Youtube.app Youtube-Mac.zip

    - name: Create GitHub Release and Upload
      uses: softprops/action-gh-release@v2
      with:
        files: build/Release/Youtube-Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
